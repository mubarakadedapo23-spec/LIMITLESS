<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In — LIMITLESS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#030308;--surface:#0d0d1a;--border:rgba(255,255,255,0.08);--text:#e8e8f4;--muted:#666680;--cyan:#00e5ff;--purple:#a855f7;--red:#f87171;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:50px 50px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1;}
.logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:0.2em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:8px;}
.title{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:6px;}
.subtitle{font-size:0.88rem;color:var(--muted);text-align:center;margin-bottom:32px;}
.google-btn{width:100%;padding:12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:20px;}
.google-btn:hover{background:rgba(255,255,255,0.1);}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:0.75rem;color:var(--muted);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.8rem;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:rgba(0,229,255,0.35);}
.field input::placeholder{color:var(--muted);}
.submit-btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000;font-family:'Inter',sans-serif;font-size:0.92rem;font-weight:700;border:none;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.submit-btn:hover{transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.switch{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--muted);}
.switch a{color:var(--cyan);text-decoration:none;font-weight:500;}
.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:0.82rem;margin-bottom:16px;display:none;}
.error.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">LIMITLESS</div>
  <div class="title">Welcome back</div>
  <div class="subtitle">Sign in to your account</div>
  <div class="error" id="errorMsg"></div>
  <button class="google-btn" onclick="signInGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
    Continue with Google
  </button>
  <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com"></div>
  <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"></div>
  <button class="submit-btn" id="loginBtn" onclick="signIn()">Sign in</button>
  <div class="switch">Don't have an account? <a href="signup.html">Sign up free</a></div>
  <div class="switch" style="margin-top:12px;"><a href="../index.html" style="color:var(--muted);">← Back to home</a></div>
</div>
<script>
const SUPABASE_URL='https://hkblyysckxlbedxklqwm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYmx5eXNja3hsYmVkeGtscXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzgwMjcsImV4cCI6MjA5MDk1NDAyN30.MiqQC9MojHMImboewzLhMdi-ccqI5ru-EtdyhSmaCic';
const{createClient}=supabase;const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.classList.add('show');}
async function signIn(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  if(!email||!password)return showError('Please fill in all fields.');
  btn.disabled=true;btn.textContent='Signing in...';
  const{error}=await sb.auth.signInWithPassword({email,password});
  if(error){showError(error.message);btn.disabled=false;btn.textContent='Sign in';return;}
  window.location.href='/app/chat.html';
}
async function signInGoogle(){
  const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/app/chat.html'}});
  if(error)showError(error.message);
}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')signIn();});
sb.auth.getSession().then(({data})=>{if(data.session)window.location.href='/app/chat.html';});
</script>
</body>
</html>

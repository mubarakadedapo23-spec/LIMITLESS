<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin — LIMITLESS</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}:root{--bg:#030308;--bg2:#06060e;--surface:#0d0d1a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);--text:#e8e8f4;--muted:#666680;--cyan:#00e5ff;--purple:#a855f7;--green:#22d3a0;--gold:#fbbf24;--red:#f87171;}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.018) 1px,transparent 1px);background-size:44px 44px;}.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center;}.login-logo{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.2em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}.login-sub{font-size:0.78rem;color:var(--muted);margin-bottom:28px;}.login-input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;margin-bottom:14px;}.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000;border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;}.dash{display:none;min-height:100vh;position:relative;z-index:1;}.dash.show{display:block;}.dash-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:rgba(3,3,8,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;}.dash-logo{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.2em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}.dash-badge{font-size:0.58rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--red);border:1px solid rgba(248,113,113,0.3);padding:3px 8px;border-radius:4px;}.refresh-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);font-size:0.78rem;font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;}.dash-body{max-width:1100px;margin:0 auto;padding:32px 24px;}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}@media(max-width:800px){.stats-grid{grid-template-columns:repeat(2,1fr);}}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}.stat-card.cyan::before{background:linear-gradient(90deg,var(--cyan),transparent);}.stat-card.green::before{background:linear-gradient(90deg,var(--green),transparent);}.stat-card.purple::before{background:linear-gradient(90deg,var(--purple),transparent);}.stat-card.gold::before{background:linear-gradient(90deg,var(--gold),transparent);}.stat-label{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}.stat-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;line-height:1;margin-bottom:4px;}.stat-card.cyan .stat-value{color:var(--cyan);}.stat-card.green .stat-value{color:var(--green);}.stat-card.purple .stat-value{color:var(--purple);}.stat-card.gold .stat-value{color:var(--gold);}.stat-sub{font-size:0.72rem;color:var(--muted);}.section-title{font-weight:700;font-size:0.95rem;margin-bottom:16px;}.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:28px;}table{width:100%;border-collapse:collapse;}th{padding:12px 18px;font-size:0.65rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);}td{padding:12px 18px;font-size:0.82rem;border-bottom:1px solid var(--border);}tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(255,255,255,0.02);}.plan-chip{font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:4px;}.chip-free{color:var(--muted);background:rgba(255,255,255,0.05);border:1px solid var(--border);}.chip-pro{color:var(--cyan);background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.25);}.chip-enterprise{color:var(--purple);background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);}.error-msg{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:0.82rem;margin-bottom:16px;display:none;}.error-msg.show{display:block;}</style></head><body>
<div class="login-wrap" id="loginWrap"><div class="login-card"><div class="login-logo">LIMITLESS</div><div class="login-sub">Admin Dashboard — Restricted</div><input type="password" class="login-input" id="adminKey" placeholder="Enter admin secret key" onkeydown="if(event.key==='Enter')adminLogin()"><div class="error-msg" id="loginError">Invalid admin key.</div><button class="login-btn" onclick="adminLogin()">Access Dashboard →</button></div></div>
<div class="dash" id="dashboard"><div class="dash-nav"><div style="display:flex;align-items:center;gap:12px;"><div class="dash-logo">LIMITLESS</div><div class="dash-badge">ADMIN</div></div><div style="display:flex;align-items:center;gap:10px;"><div style="font-size:0.72rem;color:var(--muted)" id="lastUpdated"></div><button class="refresh-btn" onclick="loadStats()">↺ Refresh</button></div></div><div class="dash-body"><div id="dashContent"><p style="text-align:center;padding:48px;color:var(--muted);font-style:italic;">Loading…</p></div></div></div>
<script>
let adminKeyValue='';
function adminLogin(){const key=document.getElementById('adminKey').value.trim();if(!key)return;adminKeyValue=key;document.getElementById('loginError').classList.remove('show');loadStats();}
async function loadStats(){
  try{
    const res=await fetch('/api/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminKey:adminKeyValue})});
    if(res.status===403){document.getElementById('loginError').classList.add('show');return;}
    const data=await res.json();
    if(data.error){document.getElementById('loginError').classList.add('show');return;}
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dashboard').classList.add('show');
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString();
    const totalPaid=data.plans.pro+data.plans.enterprise;
    const convRate=data.totalUsers>0?((totalPaid/data.totalUsers)*100).toFixed(1):0;
    document.getElementById('dashContent').innerHTML=`
      <div class="stats-grid">
        <div class="stat-card cyan"><div class="stat-label">Total Users</div><div class="stat-value">${data.totalUsers.toLocaleString()}</div><div class="stat-sub">All registered</div></div>
        <div class="stat-card green"><div class="stat-label">Monthly Revenue</div><div class="stat-value">$${data.monthlyRevenue.toLocaleString()}</div><div class="stat-sub">$${data.annualRevenue.toLocaleString()} annually</div></div>
        <div class="stat-card purple"><div class="stat-label">Paying Users</div><div class="stat-value">${totalPaid.toLocaleString()}</div><div class="stat-sub">${convRate}% conversion</div></div>
        <div class="stat-card gold"><div class="stat-label">Free Users</div><div class="stat-value">${data.plans.free.toLocaleString()}</div><div class="stat-sub">Potential upgrades</div></div>
      </div>
      <div class="stats-grid" style="margin-bottom:28px;">
        <div class="stat-card cyan"><div class="stat-label">Messages Today</div><div class="stat-value">${data.todayActivity.messages.toLocaleString()}</div></div>
        <div class="stat-card purple"><div class="stat-label">Images Today</div><div class="stat-value">${data.todayActivity.images.toLocaleString()}</div></div>
        <div class="stat-card green"><div class="stat-label">Pro Users</div><div class="stat-value">${data.plans.pro}</div><div class="stat-sub">$${(data.plans.pro*15).toLocaleString()}/mo</div></div>
        <div class="stat-card gold"><div class="stat-label">Enterprise</div><div class="stat-value">${data.plans.enterprise}</div><div class="stat-sub">$${(data.plans.enterprise*49).toLocaleString()}/mo</div></div>
      </div>
      <div class="section-title">Recent Users</div>
      <div class="table-wrap"><table><thead><tr><th>Email</th><th>Plan</th><th>Status</th><th>Joined</th></tr></thead><tbody>
        ${data.recentUsers.map(u=>`<tr><td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;">${u.email}</td><td><span class="plan-chip chip-${u.plan||'free'}">${(u.plan||'free').toUpperCase()}</span></td><td style="color:${u.status==='active'?'var(--green)':'var(--muted)'}">${u.status||'free'}</td><td style="font-size:0.75rem;color:var(--muted)">${u.created_at?new Date(u.created_at).toLocaleDateString():'—'}</td></tr>`).join('')}
        ${!data.recentUsers.length?'<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px;">No users yet</td></tr>':''}
      </tbody></table></div>`;
  }catch(e){document.getElementById('loginError').textContent='Failed to load.';document.getElementById('loginError').classList.add('show');}
}
</script></body></html>
